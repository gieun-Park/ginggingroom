<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>깅깅룸 - Gingging Room</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍒 깅깅룸</h1>
            <p>Gingging Room</p>
        </header>

        <main class="camera-app">
            <section class="camera-card" aria-label="깅깅룸 카메라">
                <div class="camera-stage">
                    <canvas id="canvas" width="600" height="750"></canvas>
                    <div id="zoomControls" class="camera-zoom" role="group" aria-label="카메라 배율" hidden>
                        <button id="zoom05Btn" class="zoom-btn" type="button" aria-pressed="false">0.5x</button>
                        <button id="zoom08Btn" class="zoom-btn" type="button" aria-pressed="false">0.8x</button>
                        <button id="zoom1Btn" class="zoom-btn" type="button" aria-pressed="false">1x</button>
                    </div>
                    <div id="countdown" class="countdown" role="status" aria-live="polite" hidden></div>
                    <p id="cameraStatus" class="camera-status" role="status" aria-live="polite"></p>
                </div>
                <video id="video" muted playsinline hidden></video>

                <div class="face-feedback">
                    <p id="faceStatus" class="face-status" role="status" aria-live="polite"></p>
                    <button id="retryDetectionBtn" class="text-btn" type="button" hidden>
                        프레임 인식 다시 시도
                    </button>
                </div>

                <section id="framePicker" class="frame-picker" aria-labelledby="frameTitle">
                    <h2 id="frameTitle">프레임</h2>
                    <div class="frame-rail" id="frameGrid"></div>
                </section>

                <div class="capture-controls">
                    <label class="control-action upload-action">
                        <input type="file" id="photoInput" class="visually-hidden" accept="image/*">
                        <span aria-hidden="true">▧</span>
                        <small>업로드</small>
                    </label>
                    <button id="shutterBtn" class="shutter-btn" type="button" aria-label="사진 촬영">
                        <span></span>
                    </button>
                    <button id="timerBtn" class="control-action timer-btn" type="button" aria-label="타이머: 끔" aria-pressed="false">
                        <span aria-hidden="true">◷</span>
                        <small id="timerValue">끔</small>
                    </button>
                </div>

                <section class="result-area" id="resultArea" hidden>
                    <button id="downloadBtn" class="btn-primary" type="button">다운로드</button>
                    <button id="resetBtn" class="btn-secondary" type="button">다시 찍기</button>
                </section>
            </section>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
